<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADHD Support App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- APP CONTAINER -->
<div class="max-w-2xl mx-auto p-6">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <h1 class="text-3xl font-bold mb-4">Welcome</h1>
    <input id="email" class="w-full p-2 mb-2 border" placeholder="Email">
    <input id="password" type="password" class="w-full p-2 mb-4 border" placeholder="Password">

    <button onclick="login()" class="bg-blue-500 text-white px-4 py-2 mr-2">Login</button>
    <button onclick="signup()" class="bg-green-500 text-white px-4 py-2">Sign Up</button>
  </div>

  <!-- PROBLEM SELECTION -->
  <div id="problemScreen" class="hidden">
    <h2 class="text-2xl font-bold mb-4">What are you struggling with?</h2>

    <div class="space-y-2">
      <label><input type="checkbox" value="focus"> Can't focus</label><br>
      <label><input type="checkbox" value="procrastination"> Procrastination</label><br>
      <label><input type="checkbox" value="forgetfulness"> Forget tasks</label>
    </div>

    <button onclick="saveProblems()" class="mt-4 bg-blue-500 text-white px-4 py-2">
      Get Techniques
    </button>
  </div>

  <!-- TECHNIQUES SCREEN -->
  <div id="techniqueScreen" class="hidden">
    <h2 class="text-2xl font-bold mb-4">Recommended Techniques</h2>

    <ul id="techniqueList" class="space-y-3"></ul>

    <button onclick="goToProgress()" class="mt-6 bg-purple-500 text-white px-4 py-2">
      View Progress
    </button>
  </div>

  <!-- PROGRESS SCREEN -->
  <div id="progressScreen" class="hidden">
    <h2 class="text-2xl font-bold mb-4">Your Progress</h2>

    <p id="pointsDisplay" class="text-lg mb-2"></p>
    <p id="tasksDisplay" class="text-lg mb-4"></p>

    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2">
      Logout
    </button>
  </div>

</div>

<script>
/* ---------------- MOCK DATA ---------------- */

let userData = {
  problems: [],
  points: 0,
  completedTasks: 0
};

const problemSolutions = {
  focus: ["Pomodoro Technique", "Use noise-canceling headphones"],
  procrastination: ["5-minute rule", "Break tasks into tiny steps"],
  forgetfulness: ["Write tasks immediately", "Use phone reminders"]
};

/* ---------------- NAVIGATION ---------------- */

function showScreen(screenId) {
  document.querySelectorAll("div[id$='Screen']").forEach(div => {
    div.classList.add("hidden");
  });
  document.getElementById(screenId).classList.remove("hidden");
}

/* ---------------- AUTH (MOCK) ---------------- */

function login() {
  console.log("Login attempt (Firebase later)");
  showScreen("problemScreen");
}

function signup() {
  console.log("Signup attempt (Firebase later)");
  showScreen("problemScreen");
}

function logout() {
  console.log("Logout (Firebase later)");
  showScreen("loginScreen");
}

/* ---------------- PROBLEM SELECTION ---------------- */

function saveProblems() {
  const selected = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
    .map(cb => cb.value);

  userData.problems = selected;

  console.log("Saving problems to DB:", selected);

  showTechniques();
}

/* ---------------- TECHNIQUE ENGINE ---------------- */

function showTechniques() {
  const list = document.getElementById("techniqueList");
  list.innerHTML = "";

  userData.problems.forEach(problem => {
    problemSolutions[problem].forEach(tech => {
      const li = document.createElement("li");
      li.className = "bg-white p-3 rounded shadow flex justify-between items-center";

      li.innerHTML = `
        <span>${tech}</span>
        <button onclick="completeTask()" class="bg-green-500 text-white px-2 py-1 rounded">
          Done
        </button>
      `;

      list.appendChild(li);
    });
  });

  showScreen("techniqueScreen");
}

/* ---------------- REWARD SYSTEM ---------------- */

function completeTask() {
  userData.points += 10;
  userData.completedTasks += 1;

  console.log("Updating points in DB:", userData.points);

  alert("+10 points 🎉");
}

/* ---------------- PROGRESS ---------------- */

function goToProgress() {
  document.getElementById("pointsDisplay").innerText =
    "Total Points: " + userData.points;

  document.getElementById("tasksDisplay").innerText =
    "Tasks Completed: " + userData.completedTasks;

  showScreen("progressScreen");
}

</script>

</body>
</html>
