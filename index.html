<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, getDocs, query, where 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  import { 
    getAuth, onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // 🔹 Your Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentUser = null;

  // Track logged-in user
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      console.log("Logged in:", user.uid);
    } else {
      currentUser = null;
    }
  });

  /* ---------------- FIRESTORE FUNCTIONS ---------------- */

  // ✅ SAVE DATA
  async function saveProblemsToFirestore(problems) {
    try {
      if (!currentUser) throw new Error("User not logged in");

      await addDoc(collection(db, "userProblems"), {
        uid: currentUser.uid,   // REQUIRED ✅
        problems: problems,
        points: 0,
        completedTasks: 0,
        createdAt: new Date()
      });

      console.log("Data saved to Firestore");
    } catch (error) {
      console.error("Error saving:", error);
    }
  }

  // ✅ FETCH DATA
  async function loadUserData() {
    try {
      if (!currentUser) throw new Error("User not logged in");

      const q = query(
        collection(db, "userProblems"),
        where("uid", "==", currentUser.uid)
      );

      const querySnapshot = await getDocs(q);

      let totalPoints = 0;
      let totalTasks = 0;

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        totalPoints += data.points || 0;
        totalTasks += data.completedTasks || 0;
      });

      // Update UI
      document.getElementById("pointsDisplay").innerText =
        "Total Points: " + totalPoints;

      document.getElementById("tasksDisplay").innerText =
        "Tasks Completed: " + totalTasks;

    } catch (error) {
      console.error("Error fetching:", error);
    }
  }

  /* ---------------- CONNECT TO YOUR EXISTING UI ---------------- */

  // Override your existing function
  window.saveProblems = async function () {
    const selected = Array.from(
      document.querySelectorAll("input[type=checkbox]:checked")
    ).map(cb => cb.value);

    userData.problems = selected;

    // 🔥 Save to Firestore
    await saveProblemsToFirestore(selected);

    showTechniques();
  };

  // Override progress loader
  window.goToProgress = async function () {
    await loadUserData();
    showScreen("progressScreen");
  };

</script>
