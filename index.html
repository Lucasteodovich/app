<!DOCTYPE html>
<html>
<head>
  <title>ADHD Support App</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    .box { background: white; padding: 15px; margin: 10px 0; }
    button { margin-top: 10px; }
    .hidden { display: none; }
  </style>
</head>

<body>

<div id="loginScreen">
  <h1>Welcome</h1>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
</div>

<div id="problemScreen" class="hidden">
  <h2>What are you struggling with?</h2>

  <label><input type="checkbox" value="focus"> Can't focus</label><br>
  <label><input type="checkbox" value="procrastination"> Procrastination</label><br>
  <label><input type="checkbox" value="forgetfulness"> Forget tasks</label><br>

  <button onclick="saveProblems()">Get Techniques</button>
</div>

<div id="techniqueScreen" class="hidden">
  <h2>Recommended Techniques</h2>
  <ul id="techniqueList"></ul>

  <button onclick="goToProgress()">View Progress</button>
</div>

<div id="progressScreen" class="hidden">
  <h2>Your Progress</h2>

  <p id="pointsDisplay"></p>
  <p id="tasksDisplay"></p>
  <p id="streakDisplay"></p>

  <button onclick="logout()">Logout</button>
</div>

<script>
let userData = { problems: [] };

const solutions = {
  focus: ["Pomodoro Technique", "Noise-canceling headphones"],
  procrastination: ["5-minute rule", "Break tasks small"],
  forgetfulness: ["Write tasks immediately", "Use reminders"]
};

function showScreen(id) {
  document.querySelectorAll("div").forEach(d => d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function saveProblems() {
  const selected = [...document.querySelectorAll("input:checked")]
    .map(cb => cb.value);

  userData.problems = selected;
  showTechniques();
}

function showTechniques() {
  const list = document.getElementById("techniqueList");
  list.innerHTML = "";

  userData.problems.forEach(p => {
    solutions[p].forEach(t => {
      const li = document.createElement("li");

      li.innerHTML = `
        ${t}
        <button onclick="completeTask()">Done</button>
      `;

      list.appendChild(li);
    });
  });

  showScreen("techniqueScreen");
}

let points = 0;
let tasks = 0;

function completeTask() {
  points += 10;
  tasks += 1;
  alert("+10 points!");
}

function goToProgress() {
  document.getElementById("pointsDisplay").innerText = "Points: " + points;
  document.getElementById("tasksDisplay").innerText = "Tasks: " + tasks;
  document.getElementById("streakDisplay").innerText = "Streak: (not implemented)";
  showScreen("progressScreen");
}

function login() { showScreen("problemScreen"); }
function signup() { showScreen("problemScreen"); }
function logout() { location.reload(); }
</script>

</body>
</html>
